<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Secure Data Intelligence Platform</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-globes">
        <div class="globe globe-1"></div>
        <div class="globe globe-2"></div>
    </div>
    
    <div class="container glass-panel">
        <header>
            <h1>AI Secure Data Intelligence</h1>
            <p>Analyze logs for sensitive data, security risks, and anomalies.</p>
        </header>

        <main>
            <section class="input-section">
                <div class="upload-container">
                    <label for="fileInput" class="upload-label">
                        <span class="upload-icon">📁</span>
                        Upload Log File (.log, .txt)
                    </label>
                    <input type="file" id="fileInput" accept=".log,.txt">
                    <div id="fileNameDisplay">No file selected</div>
                </div>
                
                <div class="divider">OR</div>

                <div class="text-container">
                    <textarea id="textInput" placeholder="Paste your log content here..."></textarea>
                </div>
                
                <button id="analyzeBtn" class="btn primary-btn">
                    <span class="btn-text">Analyze Logs</span>
                    <span class="loader hidden"></span>
                </button>
            </section>

            <section id="resultsSection" class="results-section hidden">
                <div class="dashboard-header">
                    <h2>Analysis Results</h2>
                    <div id="riskBadge" class="risk-badge">Risk: <span id="riskLevelValue">-</span></div>
                </div>

                <div class="grid-container">
                    <div class="card summary-card glass-panel">
                        <h3>AI Insights</h3>
                        <p id="summaryText">Summarizing...</p>
                        <ul id="insightsList"></ul>
                    </div>

                    <div class="card findings-card glass-panel">
                        <h3>Detected Anomalies & Risks (<span id="findingsCount">0</span>)</h3>
                        <div class="table-container">
                            <table id="findingsTable">
                                <thead>
                                    <tr>
                                        <th>Line</th>
                                        <th>Type</th>
                                        <th>Severity</th>
                                        <th>Description</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
